name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: |
          # Create .app bundle structure
          APP="staging/Batch Installer.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Copy installer script into Resources
          cp macOS/installer.sh "$APP/Contents/Resources/installer.sh"
          chmod +x "$APP/Contents/Resources/installer.sh"

          # Launcher: opens Terminal and runs the installer
          cat > "$APP/Contents/MacOS/Batch Installer" <<'EOF'
          #!/bin/bash
          RESOURCES="$(cd "$(dirname "$0")/../Resources" && pwd)"
          osascript <<APPLESCRIPT
          tell application "Terminal"
              activate
              do script "bash '$RESOURCES/installer.sh'; exit"
          end tell
          APPLESCRIPT
          EOF
          chmod +x "$APP/Contents/MacOS/Batch Installer"

          # Info.plist
          cat > "$APP/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Batch Installer</string>
              <key>CFBundleIdentifier</key>
              <string>com.batchinstaller.app</string>
              <key>CFBundleName</key>
              <string>Batch Installer</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
          </dict>
          </plist>
          EOF

          hdiutil create \
            -volname "Batch Installer" \
            -srcfolder staging \
            -ov \
            -format UDZO \
            "Batch-Installer-macOS.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: Batch-Installer-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis --yes

      - name: Create NSIS script
        shell: powershell
        run: |
          $nsi = @'
          Unicode true
          Name "Batch Installer"
          OutFile "Batch-Installer-Windows.exe"
          RequestExecutionLevel admin
          SilentInstall silent

          Section
            SetOutPath "$PLUGINSDIR"
            File "windows\installer.ps1"
            ExecWait 'powershell.exe -NoProfile -ExecutionPolicy Bypass -File "$PLUGINSDIR\installer.ps1"'
          SectionEnd
          '@
          $nsi | Out-File -FilePath installer.nsi -Encoding UTF8

      - name: Build EXE
        run: '& "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi'

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: Batch-Installer-Windows.exe

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Batch Installer ${{ github.ref_name }}"
          files: |
            macos-dmg/Batch-Installer-macOS.dmg
            windows-exe/Batch-Installer-Windows.exe
